services:
  - type: web
    name: crowdalpha-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /status
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
